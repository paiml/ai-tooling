name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate course structure
        run: make check

  gate:
    runs-on: ubuntu-latest
    needs: [validate]
    if: always()
    steps:
      - name: Aggregate required checks
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "validate failed: ${{ needs.validate.result }}"
            exit 1
          fi
          echo "All required checks passed."
